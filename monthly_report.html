<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GridLock — Monthly Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- jsPDF & autoTable for LaTeX-style export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(15,23,42,0.5); }
    ::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.4); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,0.6); }
    select option { background: #1e293b; color: #e2e8f0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes slideIn { from{transform:translateX(100%)} to{transform:translateX(0)} }
  </style>
</head>
<body>

  <!-- Nav Bar -->
  <div style="position:sticky;top:0;z-index:100;background:rgba(15,23,42,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.08);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;gap:12px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;animation:pulse 1.5s ease-in-out infinite;"></span>
        <span style="font-size:10px;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;color:#22c55e;">Live</span>
      </div>
      <span style="font-size:15px;font-weight:700;color:#f1f5f9;letter-spacing:0.04em;">GRIDLOCK MONTHLY REPORT</span>
      <span style="font-size:9px;background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3);padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:0.08em;">MODULE 8</span>
    </div>
    <div style="display:flex;gap:8px;">
      <a href="index.html" style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);color:#60a5fa;border-radius:10px;padding:6px 14px;font-size:12px;font-weight:600;text-decoration:none;">
        🗺 Tactical Map
      </a>
      <a href="congestion_risk.html" style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);color:#fbbf24;border-radius:10px;padding:6px 14px;font-size:12px;font-weight:600;text-decoration:none;">
        📈 Congestion Risk
      </a>
    </div>
  </div>

  <div id="root"></div>

  <script src="components/MonthlyReport.compiled.js"></script>
</body>
</html>
